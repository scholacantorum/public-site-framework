{{ define "main" }}
    <div class="gala">
        {{ with $.Page.Resources.GetMatch "image.*" }}
            <img class="galaimg" src="{{ ((.Fit "300x300") | resources.Fingerprint).RelPermalink }}" alt="{{ .Title }}">
        {{ end }}
        <div class="galabody">
            {{ .Content }}
        </div>
        {{ with $.Page.Resources.GetMatch "register.md" }}{{ .Content }}{{ end }}
    </div>
{{end}}
